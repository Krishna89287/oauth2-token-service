services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgres://auth:auth@db:5432/auth
      ISSUER: http://localhost:3000
      PORT: 3000
    ports:
      - "3000:3000"
    # Waiting for the port to open is not the same as waiting for Postgres to be
    # ready to answer. Without the health condition the API starts, fails its first
    # query, and restarts a few times before it settles.
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
